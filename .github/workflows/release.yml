name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives (linux/amd64, linux/arm64)
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64 arm64; do
            workdir="$(mktemp -d)"
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "$workdir/anytls-server" ./cmd/server
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "$workdir/anytls-client" ./cmd/client
            tar -C "$workdir" -czf "dist/anytls-linux-$arch.tar.gz" anytls-server anytls-client
          done
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS )

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/*.tar.gz dist/SHA256SUMS \
            --title "${{ github.ref_name }}" \
            --generate-notes
