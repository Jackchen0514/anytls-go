# Minimal fallback site for anytls-server's -fallback option.
#
# This only needs to be reachable from localhost — anytls-server terminates
# the real TLS connection itself and forwards the decrypted plaintext HTTP
# request here when a connection fails the anytls auth handshake. Do NOT
# put a public listen/server_name on this block; it should stay internal.
#
# Install:
#   cp index.html /var/www/anytls-fallback/index.html
#   cp nginx.conf /etc/nginx/sites-available/anytls-fallback.conf
#   ln -s /etc/nginx/sites-available/anytls-fallback.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Then start anytls-server with:
#   -fallback 127.0.0.1:8080

server {
    listen 127.0.0.1:8080;
    server_name _;

    root /var/www/anytls-fallback;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
